name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FOOTBALL_API_KEY: "test"
      APISPORTS_KEY: "test"
      BZZOIRO_KEY: "test"
      GROQ_API_KEY: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check imports
        run: python -c "import footstats; print('Import OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t footstats-api:ci .

      - name: Verify health endpoint in container
        run: |
          docker run --rm -d -p 8000:8000 \
            -e SECRET_KEY="test-secret-key-32-chars-long!!" \
            -e ALLOWED_ORIGINS="http://localhost:3000" \
            --name footstats-ci footstats-api:ci
          sleep 8
          curl -f http://localhost:8000/health
          docker stop footstats-ci
